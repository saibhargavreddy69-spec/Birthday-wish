```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@600&display=swap" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#fff7f8;
background-image:
linear-gradient(#ffd6e0 1px, transparent 1px),
linear-gradient(90deg,#ffd6e0 1px, transparent 1px);
background-size:40px 40px;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
max-width:500px;
}

/* cat image */

.cat{
width:220px;
margin-bottom:20px;
}

/* HEY text */

.hey{
font-family:'Fredoka',sans-serif;
font-size:60px;
color:#c43757;
margin-bottom:10px;
}

/* message text */

.line1{
font-family:'Pacifico',cursive;
font-size:28px;
color:#333;
}

.line2{
font-family:'Pacifico',cursive;
font-size:32px;
color:#444;
margin-bottom:25px;
}

/* buttons */

button{
background:#c94a6a;
color:white;
border:none;
padding:12px 30px;
font-size:20px;
border-radius:25px;
margin:10px;
cursor:pointer;
}

button:hover{
background:#b03c59;
}

/* screens */

.screen{
display:none;
}

.active{
display:block;
}

</style>

</head>

<body>

<div class="container">

<!-- SCREEN 1 -->

<div id="screen1" class="screen active">

<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="cat">

<h1 class="hey">HEY!!</h1>

<p class="line1">I made something for you</p>

<p class="line2">Do you want to see?</p>

<button onclick="showScreen('screen2')">Yes</button>
<button onclick="showScreen('screen3')">No</button>

</div>

<!-- SCREEN 2 -->

<div id="screen2" class="screen">

<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="cat">

<h1>Good choice 😸</h1>

<p>Click below for your surprise</p>

<button onclick="showScreen('screen4')">Click</button>

</div>

<!-- SCREEN 3 -->

<div id="screen3" class="screen">

<h1>How dare you say NO 😾</h1>

<button onclick="showScreen('screen2')">Okay fine I'll click Yes</button>

</div>

<!-- SCREEN 4 -->

<div id="screen4" class="screen">

<h1>🎉 Happy Birthday Himabindhu 🎉</h1>

<p>
Wishing you a day full of happiness and smiles ❤️
</p>

</div>

</div>

<script>

function showScreen(id){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
```
